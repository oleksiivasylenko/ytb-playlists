<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>YouTube Playlist Alternative</title>
  <style>
    body {
      width: 220px;
      margin: 0;
      padding: 12px;
      background: #0f0f0f;
      color: #f1f1f1;
      font-family: Arial, sans-serif;
    }

    h3 {
      margin: 0 0 10px;
      font-size: 15px;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    button {
      width: 100%;
      padding: 9px 10px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #212121;
      color: #f1f1f1;
      cursor: pointer;
      font-weight: 600;
      text-align: left;
    }

    button:hover {
      background: #2a2a2a;
      border-color: #555;
    }

    button.primary {
      background: #3ea6ff;
      border-color: #3ea6ff;
      color: #0f0f0f;
    }

    button.primary:hover {
      background: #65b8ff;
      border-color: #65b8ff;
    }

    #popup-status {
      min-height: 14px;
      margin-top: 8px;
      color: #ff6b6b;
      font-size: 11px;
      line-height: 1.3;
    }
  </style>
</head>
<body>
  <h3>Playlist Panel</h3>
  <div class="actions">
    <button id="open-dock-panel" class="primary">Dock Panel</button>
    <button id="open-summaries">Open Summaries</button>
    <button id="open-manager">Open Manager</button>
  </div>
  <div id="popup-status"></div>
  <script src="popup.js"></script>
</body>
</html>
